name: Build EXE

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name ipqa_checker_v3 ipqa_checker_v3.py
      
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: ipqa-checker-exe
          path: dist/ipqa_checker.exe
